version: 1

hooks:
  pre-commit:
    enabled: true
  commit-msg:
    enabled: true
  pre-push:
    enabled: true
  post-merge:
    enabled: false

policies:
  blockFiles:
    - ".env"
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.crt"
  maxFileSize: "10MB"
  secretScan: true
  protectedBranches:
    - main
    - master
    - production
  conventionalCommits: true
  blockBinaries:
    - ".exe"
    - ".dll"
    - ".so"
    - ".iso"
    - ".zip"
  requiredFiles:
    - README.md
    - LICENSE

plugins:
  - name: team-rules
    enabled: true
    rules:
      - name: no-todo
        type: file-content
        pattern: "TODO:"
        message: "Commits containing TODO are not allowed"
        fix: "Resolve the TODO before committing"
      - name: no-draft-branches
        type: branch-name
        pattern: "draft-*"
        message: "Commits to draft branches are blocked"
        fix: "Switch to a non-draft branch"
